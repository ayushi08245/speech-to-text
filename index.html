<!DOCTYPE html>
<html>

<head>
<title>Speech to Text Assistive System</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>Speech-to-Text Assistive System</h1>

<div class="box">

<p id="output">Your speech will appear here...</p>

<button onclick="startSpeech()">Start Speaking</button>

<button onclick="saveSpeech()">Save Text</button>

</div>

<script>

let output = document.getElementById("output")

function startSpeech(){

const recognition = new webkitSpeechRecognition()

recognition.lang = "en-US"

recognition.start()

recognition.onresult = function(event){

let text = event.results[0][0].transcript

output.innerHTML = text

}

}

function saveSpeech(){

fetch("/save",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
text: output.innerHTML
})

})

.then(response => response.json())
.then(data => alert(data.message))

}

</script>

</body>
</html>
